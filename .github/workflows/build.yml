name: Build & Deploy ACIOS Reports

on:
  push:
    branches:
      - main
    paths:
      - "reports/**"
      - "templates/**"
      - "afi_parser.py"
      - "build.py"
      - "requirements.txt"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output

      - name: Build HTML reports
        run: python build.py all reports/

      - name: Verify generated HTML
        run: |
          echo "Generated files:"
          find output -maxdepth 1 -type f -name '*.html' -print | sort

          test -n "$(find output -maxdepth 1 -type f -name '*.html' -print -quit)"

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: acios-html
          path: output
          if-no-files-found: error

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: output
          branch: gh-pages
          clean: true
